<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Movies</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #00d9d9;
    padding-top: 100px;
}

/* Top Navigation */
.navbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 15px 20px;
    font-size: 20px;
    font-weight: bold;
}

.navbar a {
    text-decoration: none;
    color: black;
    font-size: 24px;
}

/* Header banner */
.header {
    background-color: #7b3f00;
    color: white;
    text-align: center;
    padding: 20px;
    font-style: italic;
    font-weight: bold;
}

/* Search bar */
.search-container {
    margin: 30px auto;
    width: 70%;
}

.search-container input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 6px;
    background-color: lightgray;
}

.search-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.search-actions button {
    border: none;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.search-btn {
    background: #7b3f00;
    color: white;
}

.clear-btn {
    background: #333;
    color: white;
}

.status {
    width: 70%;
    margin: 12px auto 0;
    font-size: 16px;
    font-weight: bold;
}

.results {
    width: 70%;
    margin: 20px auto 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
}

.movie-card {
    background: white;
    border: 3px solid black;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
}

.movie-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    background: #ddd;
}

.movie-meta {
    padding: 10px;
}

.movie-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 4px;
}

.movie-year {
    font-size: 14px;
    color: #333;
}

.movie-links {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.movie-links a {
    flex: 1;
    text-align: center;
    text-decoration: none;
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    color: white;
}

.trailer-link {
    background: #d62828;
}

.imdb-link {
    background: #1d3557;
}

/* Featured Image */
.featured {
    text-align: center;
    margin-top: 40px;
}

.featured img {
    width: 60%;
    max-width: 600px;
    border: 5px solid black;
    border-radius: 6px;
}
</style>
<script src="assets/js/auth.js"></script>
<script>
Auth.requireAuth();
</script>
</head>

<body>

<!-- Navigation -->
<div class="navbar">
    <a href="settings.html">Settings</a>
</div>

<!-- Header banner -->
<div class="header">
    SEARCH FOR YOUR FAVOURITE CLASSIC MOVIES
</div>

<!-- Search bar -->
<div class="search-container">
    <input id="movie-search" type="text" placeholder="Search for classic movies...">
    <div class="search-actions">
        <button class="search-btn" id="search-btn" type="button">Search</button>
        <button class="clear-btn" id="clear-btn" type="button">Clear</button>
    </div>
</div>

<div id="status" class="status"></div>
<div id="results" class="results"></div>

<!-- Featured Image -->
<div class="featured">
    <img src="assets/images/2.png" alt="Classic Movies">
</div>

<script>
const OMDB_API_KEY = "dbf743f9";
const SEARCH_HISTORY_KEY = "movie_dashboard_search_history";
const searchInput = document.getElementById("movie-search");
const searchBtn = document.getElementById("search-btn");
const clearBtn = document.getElementById("clear-btn");
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");

function setStatus(message) {
    statusEl.textContent = message;
}

function readSearchHistory() {
    const raw = localStorage.getItem(SEARCH_HISTORY_KEY);
    if (!raw) return [];

    try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
    } catch (_) {
        return [];
    }
}

function writeSearchHistory(items) {
    localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(items));
}

function saveSearchQuery(query) {
    const normalizedQuery = query.trim();
    if (!normalizedQuery) return;

    const history = readSearchHistory();
    history.unshift({
        id: `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        query: normalizedQuery,
        searchedAt: new Date().toISOString()
    });
    writeSearchHistory(history);
}

function renderMovies(movies) {
    resultsEl.innerHTML = "";

    for (const movie of movies) {
        const card = document.createElement("article");
        card.className = "movie-card";

        const poster = movie.Poster && movie.Poster !== "N/A" ? movie.Poster : "assets/images/1.png";
        const trailerUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(movie.Title + " " + movie.Year + " trailer")}`;
        const imdbUrl = `https://www.imdb.com/title/${movie.imdbID}/`;
        card.innerHTML = `
            <img src="${poster}" alt="${movie.Title}">
            <div class="movie-meta">
                <div class="movie-title">${movie.Title}</div>
                <div class="movie-year">${movie.Year}</div>
                <div class="movie-links">
                    <a class="trailer-link" href="${trailerUrl}" target="_blank" rel="noopener noreferrer">Watch Trailer</a>
                    <a class="imdb-link" href="${imdbUrl}" target="_blank" rel="noopener noreferrer">View IMDb</a>
                </div>
            </div>
        `;

        resultsEl.appendChild(card);
    }
}

async function searchMovies() {
    const query = searchInput.value.trim();

    if (!query) {
        setStatus("Type a movie name first.");
        resultsEl.innerHTML = "";
        return;
    }

    if (OMDB_API_KEY === "YOUR_OMDB_API_KEY") {
        setStatus("Add your OMDb API key in search.html first.");
        return;
    }

    setStatus("Searching...");
    resultsEl.innerHTML = "";
    saveSearchQuery(query);

    try {
        const url = `https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(query)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.Response === "False") {
            setStatus(data.Error || "No movies found.");
            return;
        }

        renderMovies(data.Search);
        setStatus(`Found ${data.Search.length} result(s) for "${query}".`);
    } catch (error) {
        setStatus("Search failed. Check your internet/API key and try again.");
    }
}

searchBtn.addEventListener("click", searchMovies);
clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    resultsEl.innerHTML = "";
    setStatus("");
    searchInput.focus();
});

searchInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        searchMovies();
    }
});
</script>

</body>
</html>
