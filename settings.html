<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #00d9d9;
    min-height: 100vh;
    padding: 30px;
}

.panel {
    max-width: 520px;
    margin: 40px auto;
    background: white;
    border: 4px solid black;
    border-radius: 8px;
    padding: 24px;
    box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.25);
}

.title {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 18px;
    color: #7b3f00;
    text-transform: uppercase;
}

.item {
    background-color: #f2f2f2;
    border: 2px solid black;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-weight: bold;
}

.item:last-child {
    margin-bottom: 0;
}

button.item {
    width: 100%;
    text-align: left;
    cursor: pointer;
}

.history-panel {
    margin-top: -4px;
    margin-bottom: 12px;
    border: 2px solid black;
    border-radius: 6px;
    padding: 10px;
    background: #fff;
}

.history-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
}

.history-actions button {
    border: 2px solid black;
    background: #333;
    color: white;
    border-radius: 6px;
    padding: 6px 10px;
    font-weight: bold;
    cursor: pointer;
}

.history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.history-entry {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    border: 2px solid black;
    border-radius: 6px;
    padding: 8px 10px;
    background: #f8f8f8;
}

.history-meta {
    min-width: 0;
}

.history-query {
    font-weight: bold;
    word-break: break-word;
}

.history-time {
    font-size: 12px;
    color: #444;
}

.delete-entry {
    border: 2px solid black;
    background: #d62828;
    color: white;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-weight: bold;
}

.history-empty {
    font-size: 14px;
    color: #333;
}

.hidden {
    display: none;
}

.back {
    display: inline-block;
    text-decoration: none;
    font-weight: bold;
    color: black;
    margin-bottom: 12px;
}
</style>
<script src="assets/js/auth.js"></script>
<script>
Auth.requireAuth();
</script>
</head>
<body>
    <div class="panel">
        <a class="back" href="search.html"><- Back</a>
        <div class="title">Settings</div>

        <button class="item" id="history-toggle" type="button">History</button>
        <div class="history-panel hidden" id="history-panel">
            <div class="history-actions">
                <button id="clear-history-btn" type="button">Clear All</button>
            </div>
            <ul class="history-list" id="history-list"></ul>
            <div class="history-empty hidden" id="history-empty">No search history yet.</div>
        </div>
        <div class="item">Download Quality</div>
        <div class="item">Subscription</div>
        <a class="item" href="index.html" id="logout-link">Logout</a>
    </div>
    <script>
        const SEARCH_HISTORY_KEY = "movie_dashboard_search_history";
        const historyToggle = document.getElementById("history-toggle");
        const historyPanel = document.getElementById("history-panel");
        const historyList = document.getElementById("history-list");
        const historyEmpty = document.getElementById("history-empty");
        const clearHistoryBtn = document.getElementById("clear-history-btn");

        function readSearchHistory() {
            const raw = localStorage.getItem(SEARCH_HISTORY_KEY);
            if (!raw) return [];

            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (_) {
                return [];
            }
        }

        function writeSearchHistory(items) {
            localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(items));
        }

        function escapeHtml(value) {
            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderHistory() {
            const history = readSearchHistory();

            if (history.length === 0) {
                historyList.innerHTML = "";
                historyEmpty.classList.remove("hidden");
                return;
            }

            historyEmpty.classList.add("hidden");
            historyList.innerHTML = history
                .map((entry) => {
                    const query = typeof entry.query === "string" ? entry.query : "";
                    const timeLabel = entry.searchedAt
                        ? new Date(entry.searchedAt).toLocaleString()
                        : "Unknown time";
                    const id = typeof entry.id === "string" ? entry.id : "";

                    return `
                        <li class="history-entry" data-id="${escapeHtml(id)}">
                            <div class="history-meta">
                                <div class="history-query">${escapeHtml(query)}</div>
                                <div class="history-time">${escapeHtml(timeLabel)}</div>
                            </div>
                            <button class="delete-entry" type="button">Delete</button>
                        </li>
                    `;
                })
                .join("");
        }

        historyToggle.addEventListener("click", () => {
            historyPanel.classList.toggle("hidden");
            if (!historyPanel.classList.contains("hidden")) {
                renderHistory();
            }
        });

        historyList.addEventListener("click", (event) => {
            const deleteButton = event.target.closest(".delete-entry");
            if (!deleteButton) return;

            const item = deleteButton.closest(".history-entry");
            const id = item?.dataset?.id;
            if (!id) return;

            const nextHistory = readSearchHistory().filter((entry) => entry.id !== id);
            writeSearchHistory(nextHistory);
            renderHistory();
        });

        clearHistoryBtn.addEventListener("click", () => {
            writeSearchHistory([]);
            renderHistory();
        });

        document.getElementById("logout-link").addEventListener("click", (event) => {
            event.preventDefault();
            Auth.logout();
            Auth.clearFlow();
            window.location.replace("index.html");
        });
    </script>
</body>
</html>
