<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #00d9d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border: 4px solid black;
            border-radius: 8px;
            padding: 28px 26px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.25);
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 18px;
            text-transform: uppercase;
            color: #7b3f00;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            margin-bottom: 22px;
            color: #333;
        }

        label {
            display: block;
            font-weight: bold;
            margin: 12px 0 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid black;
            border-radius: 6px;
            background-color: #f2f2f2;
            font-size: 16px;
        }

        .actions {
            margin-top: 18px;
        }

        .btn {
            width: 100%;
            background-color: purple;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .links {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
        }

        .links a {
            color: #7b3f00;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .back {
            display: inline-block;
            margin-bottom: 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    <div class="card">
        <a class="back" href="index.html"><- Back</a>
        <div class="title">Create Account</div>
        <div class="subtitle">Join the Movie Dashboard</div>

        <form id="account-form">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a password" required>

            <label for="confirm">Confirm Password</label>
            <input id="confirm" type="password" placeholder="Re-enter your password" required>

            <div class="actions">
                <button class="btn" type="submit">Create Account</button>
            </div>
        </form>

        <div class="links">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        Auth.requireFlowStart();
        Auth.redirectIfAuthenticated();
        const API_BASE_URL = (window.AppConfig?.apiBaseUrl || "http://localhost:3000").replace(/\/$/, "");

        const form = document.getElementById("account-form");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirm = document.getElementById("confirm");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                email: email.value.trim(),
                password: password.value.trim(),
                confirmPassword: confirm.value.trim()
            };

            if (!payload.email || !payload.password || !payload.confirmPassword) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok) {
                    alert(data.error || "Registration failed.");
                    return;
                }

                alert("Account created successfully! Please sign in.");
                window.location.replace("login.html");
            } catch (error) {
                if (API_BASE_URL.includes("localhost")) {
                    alert("Could not connect to the server.\nRun start-dashboard.cmd from the project folder, then try again.");
                } else {
                    alert("Could not connect to the server. Please try again later.");
                }
            }
        });
    </script>
</body>
</html>
